name: DeltaSave
version: ${version}
main: com.hidesun1372.deltasave.DeltaSavePlugin
api-version: "26.1"
description: A Deltarune-inspired checkpoint save system for Minecraft servers
authors: [hidesun1372]

commands:
  save:
    description: Save your game
    permission: deltasave.admin
  load:
    description: Load your last save
    permission: deltasave.admin
  deletesave:
    description: Delete your save file
    permission: deltasave.admin
  saveinfo:
    description: View save file info
  givesaveblock:
    description: Give a Save Block beacon
    permission: deltasave.admin
  setdefaultspawn:
    description: Sets the default spawn location.
    permission: deltasave.admin
  togglebeacongui:
    description: Toggles the beacon GUI on or off.
    permission: deltasave.admin
  storage:
    description: Open a player's storage
    permission: deltasave.admin
  scannow:
    description: Instantly scan and deregister missing save blocks
    permission: deltasave.admin

permissions:
  deltasave.admin:
    description: Grants access to DeltaSave admin commands
    default: op